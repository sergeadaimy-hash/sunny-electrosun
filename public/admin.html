<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Electro-Sun Inbox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hi: #334155;
      --border: #334155;
      --border-soft: #1e293b;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-faint: #64748b;
      --accent: #10b981;
      --accent-dim: #047857;
      --hot: #ef4444;
      --warm: #f59e0b;
      --cold: #3b82f6;
      --muted: #6b7280;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      height: 100vh;
      overflow: hidden;
    }
    .hidden { display: none !important; }

    /* LOGIN */
    .login-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .login-card {
      background: var(--surface);
      padding: 32px;
      border-radius: 12px;
      width: 360px;
      max-width: 90vw;
      border: 1px solid var(--border);
    }
    .login-card h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .login-card p {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 20px;
    }
    .login-card input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
    }
    .login-card input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .login-card button {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .login-card button:hover { background: var(--accent-dim); }
    .login-error {
      color: var(--hot);
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
    }

    /* APP LAYOUT */
    .app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 16px; font-weight: 600; }
    .header-stats { display: flex; gap: 16px; align-items: center; font-size: 13px; }
    .badge {
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--bg);
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }
    .badge.over { background: var(--hot); color: #fff; }
    .icon-btn {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--text-dim); }

    main { display: grid; grid-template-columns: 360px 1fr; overflow: hidden; }
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
      .conversation-list { border-right: none; border-bottom: 1px solid var(--border); }
      .conv-view-pane { display: none; }
      .conv-view-pane.show-mobile { display: flex; }
    }

    /* CONVERSATION LIST */
    .conversation-list {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }
    .filter-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 8px;
      gap: 4px;
      flex-wrap: wrap;
    }
    .filter-tabs button {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      flex: 0 1 auto;
    }
    .filter-tabs button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .filter-tabs button:hover:not(.active) { color: var(--text); }
    .conv-scroll { overflow-y: auto; flex: 1; }
    .conv-row {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-soft);
      cursor: pointer;
      display: flex; flex-direction: column; gap: 4px;
    }
    .conv-row:hover { background: rgba(255,255,255,0.02); }
    .conv-row.active { background: rgba(16, 185, 129, 0.1); }
    .conv-row .row1 {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .conv-row .name { font-weight: 500; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conv-row .time { font-size: 11px; color: var(--text-faint); flex-shrink: 0; }
    .conv-row .preview {
      font-size: 12px; color: var(--text-dim);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .conv-row .meta { display: flex; gap: 6px; align-items: center; font-size: 11px; }
    .pill {
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--bg);
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .pill.hot { background: var(--hot); color: #fff; }
    .pill.warm { background: var(--warm); color: #000; }
    .pill.cold { background: var(--cold); color: #fff; }
    .pill.disqualified { background: var(--muted); color: #fff; }
    .pill.human { background: #8b5cf6; color: #fff; }
    .pill.pending-q { background: #f59e0b; color: #000; }
    .empty-list {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
    }

    /* CONVERSATION VIEW */
    .conv-view-pane {
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .conv-empty {
      display: flex; align-items: center; justify-content: center;
      flex: 1; color: var(--text-faint);
    }
    .conv-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px;
      background: var(--surface);
    }
    .conv-header .who { display: flex; flex-direction: column; gap: 2px; }
    .conv-header .who .name { font-weight: 600; font-size: 15px; }
    .conv-header .who .phone { font-size: 12px; color: var(--text-dim); font-family: monospace; }
    .conv-header .conv-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .conv-header .actions { display: flex; gap: 6px; }
    .btn {
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .btn:hover { background: var(--surface-hi); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-dim); }
    .btn.danger { border-color: var(--hot); color: var(--hot); }
    .btn.danger:hover { background: var(--hot); color: #fff; }

    .messages {
      flex: 1; overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column; gap: 8px;
      background: var(--bg);
    }
    .msg {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 8px;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 13px;
    }
    .msg .meta-line { font-size: 10px; color: var(--text-faint); margin-top: 4px; }
    .msg.in {
      background: var(--surface);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }
    .msg.out {
      background: var(--accent-dim);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }
    .msg.out.human {
      background: #6d28d9;
    }
    .msg .intent {
      font-size: 10px;
      opacity: 0.7;
      margin-bottom: 2px;
      letter-spacing: 0.3px;
    }

    .compose {
      padding: 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .compose textarea {
      flex: 1;
      min-height: 40px; max-height: 160px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }
    .compose textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .compose button { align-self: stretch; padding: 0 18px; }

    .compose-hint {
      padding: 0 12px 8px;
      font-size: 11px;
      color: var(--text-faint);
    }

    /* PENDING QUERIES PANEL */
    .pending-banner {
      padding: 8px 14px;
      background: rgba(245, 158, 11, 0.15);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--warm);
    }

    /* SCROLLBARS */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--surface-hi); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-overlay">
  <div class="login-card">
    <h1>Electro-Sun agent inbox</h1>
    <p>Sign in with the dashboard API key.</p>
    <input id="api-key-input" type="password" placeholder="API key" autocomplete="off">
    <button id="login-btn">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <header>
    <h1>Electro-Sun inbox</h1>
    <div class="header-stats">
      <span class="badge" id="pending-badge">0 pending</span>
      <span class="badge" id="budget-badge">$0.00</span>
      <button class="icon-btn" id="refresh-btn">Refresh</button>
      <button class="icon-btn" id="logout-btn">Sign out</button>
    </div>
  </header>

  <main>
    <aside class="conversation-list">
      <div class="filter-tabs">
        <button class="active" data-filter="all">All</button>
        <button data-filter="pending">Pending</button>
        <button data-filter="hot">HOT</button>
        <button data-filter="warm">WARM</button>
        <button data-filter="human">Human</button>
        <button data-filter="C2">C2</button>
        <button data-filter="C3">C3</button>
        <button data-filter="C5">C5</button>
      </div>
      <div class="conv-scroll" id="conversations">
        <div class="empty-list">Loading.</div>
      </div>
    </aside>

    <section class="conv-view-pane" id="conv-view">
      <div class="conv-empty" id="conv-empty">Select a conversation on the left.</div>
    </section>
  </main>
</div>

<script>
const API_KEY_STORAGE = 'electrosun_admin_api_key';
let apiKey = localStorage.getItem(API_KEY_STORAGE);
let allConversations = [];
let pendingQueries = [];
let currentConversationId = null;
let activeFilter = 'all';
let refreshTimer = null;
let inFlight = false;

// API HELPERS

async function apiFetch(path, options = {}) {
  const headers = {
    'X-API-Key': apiKey,
    'Content-Type': 'application/json',
    ...(options.headers || {})
  };
  const res = await fetch('/api' + path, { ...options, headers });
  if (res.status === 401) {
    logout();
    throw new Error('unauthorized');
  }
  if (!res.ok) {
    const txt = await res.text().catch(() => '');
    throw new Error('HTTP ' + res.status + ' ' + txt);
  }
  return res.json();
}

// AUTH

function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
}
function showApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}
function logout() {
  localStorage.removeItem(API_KEY_STORAGE);
  apiKey = null;
  showLogin();
}

async function login() {
  const key = document.getElementById('api-key-input').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!key) { errEl.textContent = 'Enter the API key.'; return; }
  apiKey = key;
  try {
    await apiFetch('/budget/today');
    localStorage.setItem(API_KEY_STORAGE, key);
    showApp();
    await refreshAll();
    refreshTimer = setInterval(refreshAll, 15000);
  } catch (err) {
    errEl.textContent = 'Sign in failed. Check the key and try again.';
    apiKey = null;
  }
}

document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
document.getElementById('logout-btn').addEventListener('click', logout);
document.getElementById('refresh-btn').addEventListener('click', refreshAll);

// FILTERS

document.querySelectorAll('.filter-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderConversations();
  });
});

// REFRESH

async function refreshAll() {
  if (inFlight) return;
  inFlight = true;
  try {
    const [inbox, pending, budget] = await Promise.all([
      apiFetch('/inbox?limit=200'),
      apiFetch('/queries/pending'),
      apiFetch('/budget/today')
    ]);
    allConversations = inbox.conversations || [];
    pendingQueries = pending.pending || [];
    renderHeader(budget);
    renderConversations();
    if (currentConversationId) {
      await loadConversationDetail(currentConversationId, false);
    }
  } catch (err) {
    console.error('refresh failed', err);
  } finally {
    inFlight = false;
  }
}

function renderHeader(budget) {
  const pendingEl = document.getElementById('pending-badge');
  pendingEl.textContent = (pendingQueries.length || 0) + ' pending';
  pendingEl.classList.toggle('over', pendingQueries.length > 0);

  const budgetEl = document.getElementById('budget-badge');
  if (budget.budget_usd !== null) {
    budgetEl.textContent = '$' + budget.spend_usd + ' / $' + budget.budget_usd;
    budgetEl.classList.toggle('over', !!budget.over_budget);
  } else {
    budgetEl.textContent = '$' + budget.spend_usd;
  }
}

// LIST RENDER

function passesFilter(conv) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'pending') return (conv.pending_queries_count || 0) > 0;
  if (activeFilter === 'hot') return conv.lead_temperature === 'HOT';
  if (activeFilter === 'warm') return conv.lead_temperature === 'WARM';
  if (activeFilter === 'human') return !!conv.human_handled;
  return conv.category === activeFilter;
}

function renderConversations() {
  const root = document.getElementById('conversations');
  const filtered = allConversations.filter(passesFilter);
  if (!filtered.length) {
    root.innerHTML = '<div class="empty-list">Nothing here yet.</div>';
    return;
  }
  root.innerHTML = filtered.map(c => convRowHtml(c)).join('');
  root.querySelectorAll('.conv-row').forEach(row => {
    row.addEventListener('click', () => {
      const id = parseInt(row.dataset.id, 10);
      selectConversation(id);
    });
  });
}

function convRowHtml(c) {
  const tempPill = c.lead_temperature ? '<span class="pill ' + c.lead_temperature.toLowerCase() + '">' + c.lead_temperature + '</span>' : '';
  const catPill = c.category ? '<span class="pill">' + c.category + '</span>' : '';
  const humanPill = c.human_handled ? '<span class="pill human">HUMAN</span>' : '';
  const pendingPill = (c.pending_queries_count || 0) > 0 ? '<span class="pill pending-q">' + c.pending_queries_count + ' Q</span>' : '';
  const direction = c.last_message_direction === 'outbound' ? '→ ' : '';
  const preview = (c.last_message_body || '').slice(0, 80);
  const time = c.last_message_at ? shortTime(c.last_message_at) : '';
  const active = c.conversation_id === currentConversationId ? ' active' : '';
  const name = escapeHtml(c.name || c.phone || 'unknown');
  return [
    '<div class="conv-row' + active + '" data-id="' + c.conversation_id + '">',
    '  <div class="row1">',
    '    <span class="name">' + name + '</span>',
    '    <span class="time">' + time + '</span>',
    '  </div>',
    '  <div class="preview">' + escapeHtml(direction + preview) + '</div>',
    '  <div class="meta">' + tempPill + catPill + humanPill + pendingPill + '</div>',
    '</div>'
  ].join('');
}

function shortTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// CONVERSATION DETAIL

async function selectConversation(id) {
  currentConversationId = id;
  renderConversations();
  await loadConversationDetail(id, true);
}

async function loadConversationDetail(id, scrollToBottom) {
  try {
    const data = await apiFetch('/conversations/' + id);
    renderConversationView(data, scrollToBottom);
  } catch (err) {
    console.error('load conversation failed', err);
  }
}

function renderConversationView(data, scrollToBottom) {
  const root = document.getElementById('conv-view');
  const conv = data.conversation;
  const contact = data.contact;
  const msgs = data.messages || [];
  const isHuman = !!conv.human_handled;

  const tempPill = contact?.lead_temperature ? '<span class="pill ' + contact.lead_temperature.toLowerCase() + '">' + contact.lead_temperature + '</span>' : '';
  const catPill = contact?.category ? '<span class="pill">' + contact.category + '</span>' : '';
  const clientPill = contact?.client_type ? '<span class="pill">' + contact.client_type + '</span>' : '';
  const humanPill = isHuman ? '<span class="pill human">HUMAN HANDLED</span>' : '';

  const handleBtn = isHuman
    ? '<button class="btn" id="release-btn">Return to agent</button>'
    : '<button class="btn" id="handle-btn">Take over</button>';

  const messagesHtml = msgs.map(m => msgHtml(m)).join('');

  root.innerHTML = [
    '<div class="conv-header">',
    '  <div class="who">',
    '    <span class="name">' + escapeHtml(contact?.name || 'unknown') + '</span>',
    '    <span class="phone">' + escapeHtml(contact?.phone || '') + '</span>',
    '    <div class="conv-meta">' + tempPill + catPill + clientPill + humanPill + '</div>',
    '  </div>',
    '  <div class="actions">' + handleBtn + '</div>',
    '</div>',
    '<div class="messages" id="msg-list">' + messagesHtml + '</div>',
    '<div class="compose-hint">' + (isHuman ? 'You are handling this conversation. The agent will not auto-reply.' : 'Sending a manual reply will mark this conversation as human-handled. The agent will stop replying until you tap Return to agent.') + '</div>',
    '<div class="compose">',
    '  <textarea id="reply-input" placeholder="Type a reply (sends from the Electro-Sun number)..."></textarea>',
    '  <button class="btn primary" id="send-btn">Send</button>',
    '</div>'
  ].join('');

  if (scrollToBottom) {
    requestAnimationFrame(() => {
      const list = document.getElementById('msg-list');
      list.scrollTop = list.scrollHeight;
    });
  }

  const handleBtnEl = document.getElementById('handle-btn');
  if (handleBtnEl) handleBtnEl.addEventListener('click', () => takeOver(conv.id));
  const releaseBtnEl = document.getElementById('release-btn');
  if (releaseBtnEl) releaseBtnEl.addEventListener('click', () => release(conv.id));
  document.getElementById('send-btn').addEventListener('click', () => sendReply(conv.id));
  document.getElementById('reply-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      sendReply(conv.id);
    }
  });
}

function msgHtml(m) {
  const isHuman = m.intent === 'human_manual_reply' || m.intent === 'owner_provided_answer';
  const cls = m.direction === 'inbound' ? 'msg in' : ('msg out' + (isHuman ? ' human' : ''));
  const intentTag = m.intent ? '<div class="intent">' + escapeHtml(m.intent) + '</div>' : '';
  return [
    '<div class="' + cls + '">',
    intentTag,
    '<div>' + escapeHtml(m.body) + '</div>',
    '<div class="meta-line">' + shortTime(m.timestamp) + '</div>',
    '</div>'
  ].join('');
}

async function takeOver(id) {
  try {
    await apiFetch('/conversations/' + id + '/handle', { method: 'POST' });
    await loadConversationDetail(id, false);
    await refreshAll();
  } catch (err) {
    alert('Take over failed: ' + err.message);
  }
}

async function release(id) {
  try {
    await apiFetch('/conversations/' + id + '/release', { method: 'POST' });
    await loadConversationDetail(id, false);
    await refreshAll();
  } catch (err) {
    alert('Release failed: ' + err.message);
  }
}

async function sendReply(id) {
  const input = document.getElementById('reply-input');
  const text = input.value.trim();
  if (!text) return;
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending...';
  try {
    await apiFetch('/conversations/' + id + '/send-reply', {
      method: 'POST',
      body: JSON.stringify({ text })
    });
    input.value = '';
    await loadConversationDetail(id, true);
    await refreshAll();
  } catch (err) {
    alert('Send failed: ' + err.message);
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send';
  }
}

// INIT

if (apiKey) {
  showApp();
  refreshAll().then(() => {
    refreshTimer = setInterval(refreshAll, 15000);
  }).catch(() => {
    showLogin();
  });
} else {
  showLogin();
}
</script>

</body>
</html>
